name: Build and deploy site

# When this runs:
#   - automatically whenever you commit a change to the spreadsheet or the build script
#   - or manually, via the "Run workflow" button on the Actions tab
on:
  push:
    branches: [main]
    paths:
      - "Useful_Information_for_Apprenticeships.xlsx"
      - "build.py"
      - ".github/workflows/build.yml"
  workflow_dispatch: {}

# Permissions GitHub Pages needs to publish
permissions:
  contents: read
  pages: write
  id-token: write

# If you push twice quickly, let the newer run supersede the older one
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install openpyxl

      - name: Build index.html from the spreadsheet
        run: python build.py Useful_Information_for_Apprenticeships.xlsx

      - name: Package the site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
